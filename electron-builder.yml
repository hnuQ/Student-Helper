appId: com.student-helper.app
productName: Student Helper

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json

extraResources:
  - from: prisma
    to: prisma
  - from: node_modules/.prisma/client
    to: .prisma/client
  - from: node_modules/@prisma/engines
    to: node_modules/@prisma/engines

asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/.prisma/**"
  - "**/node_modules/@prisma/engines/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Student-Helper-${version}-win-setup.${ext}
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Student Helper
